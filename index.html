<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>T-FONTE 予定シェア</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f8fa;
      color: #222;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      margin-bottom: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .preview-text {
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 15px;
    }

    .button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .button-primary {
      background: #06c755;
      color: #fff;
    }

    .button-secondary {
      background: #e9edf2;
      color: #333;
    }

    .button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .hidden {
      display: none !important;
    }

    .status {
      color: #666;
      font-size: 14px;
      text-align: center;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #666;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #ddd;
      border-top-color: #06c755;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="title">予定プレビュー</div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span>予定を読み込み中...</span>
    </div>

    <div id="preview" class="preview-text hidden"></div>
  </div>

  <button id="shareBtn" class="button button-primary hidden">LINEで送る</button>
  <button id="reloadBtn" class="button button-secondary hidden">再読み込み</button>

  <p id="status" class="status">初期化中...</p>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    const LIFF_ID = "2009927582-9QtOstUK";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzXgPNJkiAB4eGVUwExQ8ehA8wMM93rSGk8OcvZe-1fo6ozalkr4Ov83KCwouA5WN1K/exec";

    const els = {
      loading: document.getElementById("loading"),
      preview: document.getElementById("preview"),
      shareBtn: document.getElementById("shareBtn"),
      reloadBtn: document.getElementById("reloadBtn"),
      status: document.getElementById("status"),
    };

    let shareMessages = [];

    async function main() {
      setLoading();

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          els.status.textContent = "LINEログインへ移動します...";
          els.loading.classList.add("hidden");
          liff.login();
          return;
        }

        if (!liff.isApiAvailable("shareTargetPicker")) {
          throw new Error("この環境ではシェア機能を利用できません。");
        }

        const data = await fetchShareData();
        console.log("GAS response:", data);

        const originalMessages = normalizeMessages(data);

        if (!originalMessages.length) {
          throw new Error("送信できるメッセージがありません。");
        }

        shareMessages = createShareMessages(originalMessages);

        renderPreviewFromMessages(shareMessages);
        setReady();

      } catch (err) {
        console.error(err);
        setError(err.message);
      }
    }

    async function fetchShareData() {
      const res = await fetch(GAS_URL, {
        method: "GET",
        cache: "no-store",
      });

      if (!res.ok) {
        throw new Error("GASへの接続に失敗しました。");
      }

      return await res.json();
    }

    function normalizeMessages(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.messages)) return data.messages;
      if (Array.isArray(data.data)) return data.data;
      if (data.type) return [data];
      return [];
    }

    function createShareMessages(messages) {
      return messages.map(message => {
        if (message.type === "flex") {
          const cloned = cloneObject(message);
          addCalendarButtonsToFlex(cloned);
          return cloned;
        }

        if (message.type === "text") {
          const flex = createFlexFromTextMessage(message.text || "");
          return flex || message;
        }

        return message;
      });
    }

    function cloneObject(value) {
      if (typeof structuredClone === "function") {
        return structuredClone(value);
      }

      return JSON.parse(JSON.stringify(value));
    }

    function addCalendarButtonsToFlex(flexMessage) {
      const heroContents = flexMessage?.contents?.hero?.contents;

      heroContents.unshift({
        type: "text",
        text: "※各予定タップでGoogleカレンダーに追加",
        size: "xs",
        color: "#888888",
        wrap: true,
        margin: "md"
      });

      if (!Array.isArray(heroContents)) return;

      heroContents.forEach(item => {
        if (!isScheduleBox(item)) return;
        
        const record = extractRecordFromScheduleBox(item);
        const calendarUrl = createGoogleCalendarUrlFromRecord(record);

        item.action = {
          type: "uri",
          uri: calendarUrl
        };

        item.contents = item.contents.filter(child => child.type !== "button");
      });
    }

    function isScheduleBox(item) {
      if (!item || item.type !== "box") return false;
      if (!Array.isArray(item.contents)) return false;

      const texts = item.contents
        .filter(child => child.type === "text")
        .map(child => child.text || "");

      return texts.length >= 3 && looksLikeDateTimeLine(texts[1]);
    }

    function hasCalendarButton(item) {
      return item.contents.some(child =>
        child.type === "button" &&
        child.action &&
        child.action.type === "uri" &&
        child.action.label === "🗓️ Googleカレンダー登録"
      );
    }

    function extractRecordFromScheduleBox(item) {
      const texts = item.contents
        .filter(child => child.type === "text")
        .map(child => child.text || "");

      return {
        title: texts[0] || "予定",
        dateLine: texts[1] || "",
        place: texts[2] || ""
      };
    }

    function createFlexFromTextMessage(text) {
      const parsed = parseReminderText(text);

      if (!parsed.records.length) {
        return null;
      }

      return {
        type: "flex",
        altText: parsed.title || "予定のお知らせ",
        contents: {
          type: "bubble",
          size: "mega",
          header: {
            type: "box",
            layout: "vertical",
            backgroundColor: "#4284F3",
            paddingAll: "16px",
            contents: [
              {
                type: "text",
                text: parsed.title || "予定のお知らせ",
                color: "#ffffff",
                weight: "bold",
                size: "lg",
                wrap: true
              },
              {
                type: "text",
                text: parsed.intro || "直近の予定はこちらです👇",
                color: "#ffffff",
                size: "sm",
                margin: "sm",
                wrap: true
              }
            ]
          },
          body: {
            type: "box",
            layout: "vertical",
            spacing: "md",
            contents: [
              ...parsed.records.map(createRecordBox),
              {
                type: "separator",
                margin: "md"
              },
              {
                type: "text",
                text: parsed.closing + "※各予定タップでGoogleカレンダーに追加",
                size: "sm",
                color: "#555555",
                wrap: true,
                margin: "md"
              }
            ]
          }
        }
      };
    }

    function parseReminderText(text) {
      const lines = String(text)
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean);

      const title = lines[0] || "予定のお知らせ";
      const intro = lines[1] || "";

      const records = [];
      let closing = "";
      let extraLink = "";

      for (let i = 2; i < lines.length; i++) {
        const memo1 = lines[i];
        const dateLine = lines[i + 1] || "";
        const placeLine = lines[i + 2] || "";

        if (isUrl(memo1)) {
          extraLink = memo1;
          break;
        }

        if (!looksLikeDateTimeLine(dateLine)) {
          closing = memo1;
          continue;
        }

        records.push({
          memo1,
          dateLine,
          placeLine,
          googleCalendarUrl: createGoogleCalendarUrlFromRecord({
            title: memo1,
            dateLine,
            place: placeLine,
            details: [text, extraLink].filter(Boolean).join("\n")
          })
        });

        i += 2;
      }

      if (!closing) {
        const last = lines[lines.length - 1] || "";
        if (!looksLikeDateTimeLine(last) && !isUrl(last)) {
          closing = last;
        }
      }

      return {
        title,
        intro,
        closing,
        records
      };
    }

    function createRecordBox(record) {
      return {
        type: "box",
        layout: "vertical",
        spacing: "xs",
        paddingAll: "12px",
        backgroundColor: "#F6F8FB",
        cornerRadius: "12px",
        contents: [
          {
            type: "text",
            text: record.memo1 || "予定",
            weight: "bold",
            size: "md",
            color: "#222222",
            wrap: true
          },
          {
            type: "text",
            text: record.dateLine || "",
            size: "sm",
            color: "#555555",
            wrap: true
          },
          {
            type: "text",
            text: record.placeLine || "",
            size: "sm",
            color: "#555555",
            wrap: true
          }
        ]
      };
    }

    function createGoogleCalendarUrlFromRecord(record) {
      const parsedDate = parseDateTimeLine(record.dateLine);
      const title = record.title || "予定";
      const location = record.place || record.placeLine || "";
      const details = record.details || [
        title,
        record.dateLine || "",
        location
      ].filter(Boolean).join("\n");

      const params = new URLSearchParams({
        action: "TEMPLATE",
        text: title,
        dates: `${formatGoogleDate(parsedDate.start)}/${formatGoogleDate(parsedDate.end)}`,
        details,
        location,
        ctz: "Asia/Tokyo"
      });

      return `https://calendar.google.com/calendar/render?${params.toString()}`;
    }

    function parseDateTimeLine(line) {
      const now = new Date();
      const currentYear = now.getFullYear();
      const cleaned = String(line).replace(/\s+/g, " ");

      const dateMatch = cleaned.match(/(\d{1,2})[\/月](\d{1,2})(?:日)?/);
      const timeMatch = cleaned.match(/(\d{1,2}):(\d{2})\s*[-〜~－]\s*(\d{1,2}):(\d{2})/);

      if (!dateMatch || !timeMatch) {
        const start = new Date(now.getTime() + 60 * 60 * 1000);
        const end = new Date(start.getTime() + 60 * 60 * 1000);
        return { start, end };
      }

      const month = Number(dateMatch[1]);
      const day = Number(dateMatch[2]);

      const startHour = Number(timeMatch[1]);
      const startMinute = Number(timeMatch[2]);
      const endHour = Number(timeMatch[3]);
      const endMinute = Number(timeMatch[4]);

      const start = new Date(currentYear, month - 1, day, startHour, startMinute, 0);
      const end = new Date(currentYear, month - 1, day, endHour, endMinute, 0);

      if (end <= start) {
        end.setDate(end.getDate() + 1);
      }

      return { start, end };
    }

    function formatGoogleDate(date) {
      const yyyy = date.getFullYear();
      const MM = pad2(date.getMonth() + 1);
      const dd = pad2(date.getDate());
      const hh = pad2(date.getHours());
      const mm = pad2(date.getMinutes());
      const ss = "00";

      return `${yyyy}${MM}${dd}T${hh}${mm}${ss}`;
    }

    function pad2(num) {
      return String(num).padStart(2, "0");
    }

    function looksLikeDateTimeLine(line) {
      return /\d{1,2}[\/月]\d{1,2}/.test(line) &&
        /\d{1,2}:\d{2}\s*[-〜~－]\s*\d{1,2}:\d{2}/.test(line);
    }

    function isUrl(value) {
      return /^https?:\/\//.test(String(value || ""));
    }

    function renderPreviewFromMessages(messages) {
      const first = messages[0];

      if (!first) {
        els.preview.textContent = "プレビューできるメッセージがありません。";
        return;
      }

      if (first.type === "text") {
        els.preview.textContent = first.text || "";
        return;
      }

      if (first.type === "flex") {
        const extractedText = extractTextFromFlex(first.contents);
        els.preview.textContent = extractedText || "Flex Messageを読み込みました。";
        return;
      }

      els.preview.textContent = JSON.stringify(first, null, 2);
    }

    function extractTextFromFlex(node) {
      const texts = [];
      walkFlex(node, texts);
      return texts.join("\n");
    }

    function walkFlex(node, texts) {
      if (!node || typeof node !== "object") return;

      if (node.type === "text" && node.text) {
        texts.push(node.text);
      }

      if (Array.isArray(node.contents)) {
        node.contents.forEach(child => walkFlex(child, texts));
      }

      if (node.header) walkFlex(node.header, texts);
      if (node.hero) walkFlex(node.hero, texts);
      if (node.body) walkFlex(node.body, texts);
      if (node.footer) walkFlex(node.footer, texts);
    }

    async function handleShare() {
      try {
        els.shareBtn.disabled = true;
        els.shareBtn.textContent = "送信先を選択中...";

        const result = await liff.shareTargetPicker(shareMessages, {
          isMultiple: true,
        });

        if (result) {
          els.shareBtn.textContent = "送信しました";
          els.status.textContent = "トークを確認してください。";

          setTimeout(() => {
            liff.closeWindow();
          }, 1200);
        } else {
          els.shareBtn.disabled = false;
          els.shareBtn.textContent = "LINEで送る";
          els.status.textContent = "送信をキャンセルしました。";
        }

      } catch (err) {
        console.error(err);
        els.shareBtn.disabled = false;
        els.shareBtn.textContent = "LINEで送る";
        els.status.textContent = "送信失敗: " + err.message;
      }
    }

    function setLoading() {
      els.loading.classList.remove("hidden");
      els.preview.classList.add("hidden");
      els.shareBtn.classList.add("hidden");
      els.reloadBtn.classList.add("hidden");
      els.status.textContent = "読み込み中...";
    }

    function setReady() {
      els.loading.classList.add("hidden");
      els.preview.classList.remove("hidden");
      els.shareBtn.classList.remove("hidden");
      els.reloadBtn.classList.add("hidden");
      els.shareBtn.disabled = false;
      els.shareBtn.textContent = "LINEで送る";
      els.status.textContent = "送信準備OK";
    }

    function setError(message) {
      els.loading.classList.add("hidden");
      els.preview.classList.remove("hidden");
      els.shareBtn.classList.add("hidden");
      els.reloadBtn.classList.remove("hidden");

      els.preview.textContent =
        "🚨 読み込みに失敗しました。\n\n" + (message || "不明なエラー");

      els.status.textContent = "再読み込みしてください。";
    }

    els.shareBtn.addEventListener("click", handleShare);
    els.reloadBtn.addEventListener("click", main);

    main();
  </script>
</body>
</html>
