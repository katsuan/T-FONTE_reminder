<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>予定シェア</title>
</head>
<body>
  <h1>予定シェア</h1>

  <button id="shareBtn" disabled>予定をLINEでシェア</button>
  <p id="status">初期化中...</p>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const LIFF_ID = "2009927582-9QtOstUK";
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzXgPNJkiAB4eGVUwExQ8ehA8wMM93rSGk8OcvZe-1fo6ozalkr4Ov83KCwouA5WN1K/exec";

    const shareBtn = document.getElementById("shareBtn");
    const statusEl = document.getElementById("status");

    let shareMessages = [];

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        if (!liff.isApiAvailable("shareTargetPicker")) {
          statusEl.textContent = "この環境ではシェアターゲットピッカーを利用できません。";
          return;
        }

        const res = await fetch(GAS_WEB_APP_URL);
        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.message || "GASからメッセージを取得できませんでした。");
        }

        shareMessages = data.messages;

        shareBtn.disabled = false;
        statusEl.textContent = "送信準備OK";

      } catch (err) {
        console.error(err);
        statusEl.textContent = "エラー: " + err.message;
      }
    }

    shareBtn.addEventListener("click", async () => {
      try {
        const result = await liff.shareTargetPicker(shareMessages, {
          isMultiple: true
        });

        statusEl.textContent = result
          ? "送信しました"
          : "キャンセルされました";

      } catch (err) {
        console.error(err);
        statusEl.textContent = "送信失敗: " + err.message;
      }
    });

    main();
  </script>
</body>
</html>
